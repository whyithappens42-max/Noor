<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noor AI</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0b0f19;
    color: white;
    display: flex;
    height: 100vh;
}

/* Sidebar */
.sidebar {
    width: 220px;
    background: #111827;
    padding: 15px;
}

.sidebar h2 {
    margin-bottom: 20px;
}

.sidebar button {
    width: 100%;
    padding: 10px;
    background: #2563eb;
    border: none;
    color: white;
    border-radius: 6px;
    cursor: pointer;
}

/* Main */
.main {
    flex: 1;
    display: flex;
    flex-direction: column;
}

/* Header */
.header {
    padding: 15px;
    background: #0f172a;
    border-bottom: 1px solid #222;
}

/* Chat */
.chat {
    flex: 1;
    padding: 20px;
    overflow-y: auto;
}

.msg {
    margin-bottom: 15px;
    max-width: 70%;
    padding: 12px;
    border-radius: 10px;
}

.user {
    background: #2563eb;
    margin-left: auto;
}

.ai {
    background: #1f2937;
}

/* Input */
.input-box {
    display: flex;
    padding: 15px;
    background: #0f172a;
}

.input-box input {
    flex: 1;
    padding: 12px;
    border-radius: 8px;
    border: none;
    outline: none;
}

.input-box button {
    margin-left: 10px;
    padding: 12px 20px;
    background: #2563eb;
    border: none;
    color: white;
    border-radius: 8px;
}

/* Modal */
.modal {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%,-50%);
    background: #111827;
    padding: 20px;
    border-radius: 10px;
    display: none;
    width: 300px;
}

.modal input {
    width: 100%;
    padding: 8px;
    margin-top: 5px;
}
</style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
    <h2>Noor AI</h2>
    <button onclick="openSettings()">⚙️ Settings</button>
</div>

<!-- Main -->
<div class="main">

    <div class="header">
        Universal AI Chat
    </div>

    <div id="chat" class="chat"></div>

    <div class="input-box">
        <input id="input" placeholder="Type your message...">
        <button onclick="send()">Send</button>
    </div>

</div>

<!-- Settings -->
<div id="modal" class="modal">
    <h3>Settings</h3>

    <label>API Key</label>
    <input id="apiKey" type="password">

    <br><br>

    <label>Model</label>
    <input id="model" placeholder="openai/gpt-3.5-turbo">

    <br><br>

    <button onclick="save()">Save</button>
</div>

<script>
const chat = document.getElementById("chat");

// Load saved
window.onload = () => {
    document.getElementById("apiKey").value = localStorage.getItem("apiKey") || "";
    document.getElementById("model").value = localStorage.getItem("model") || "openai/gpt-3.5-turbo";
};

function openSettings() {
    document.getElementById("modal").style.display = "block";
}

function save() {
    localStorage.setItem("apiKey", document.getElementById("apiKey").value);
    localStorage.setItem("model", document.getElementById("model").value);
    alert("Saved ✅");
    document.getElementById("modal").style.display = "none";
}

function add(text, type) {
    const div = document.createElement("div");
    div.className = "msg " + type;
    div.innerText = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

async function send() {
    const input = document.getElementById("input");
    const text = input.value.trim();
    if (!text) return;

    add(text, "user");
    input.value = "";

    const apiKey = localStorage.getItem("apiKey");
    const model = localStorage.getItem("model");

    if (!apiKey) {
        add("⚠️ Set API Key in settings", "ai");
        return;
    }

    add("Thinking...", "ai");

    try {
        const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
            method: "POST",
            headers: {
                "Authorization": "Bearer " + apiKey,
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                model: model,
                messages: [{ role: "user", content: text }]
            })
        });

        const data = await res.json();
        chat.lastChild.innerText = data.choices[0].message.content;

    } catch (err) {
        chat.lastChild.innerText = "Error: " + err.message;
    }
}

// Enter key
document.getElementById("input").addEventListener("keypress", e => {
    if (e.key === "Enter") send();
});
</script>

</body>
</html>
