<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Pro - Advanced Interface</title>
    <style>
        :root {
            --bg-main: #131314;
            --bg-sidebar: #1e1f20;
            --text-main: #e3e3e3;
            --accent: #4b90ff;
            --input-bg: #1e1f20;
            --user-msg-bg: #2b2c2e;
            --panel-bg: #282a2d;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-main); color: var(--text-main); height: 100vh; display: flex; overflow: hidden; }

        /* Sidebar & Settings */
        aside { width: 280px; background: var(--bg-sidebar); padding: 1rem; display: flex; flex-direction: column; z-index: 10; }
        .nav-item { background: #28292a; border: none; color: white; padding: 12px; border-radius: 25px; cursor: pointer; margin-bottom: 10px; width: 100%; text-align: left; }
        
        /* Settings Panel (Hidden by default) */
        #settings-panel {
            position: fixed; right: -350px; top: 0; width: 320px; height: 100%;
            background: var(--panel-bg); box-shadow: -5px 0 15px rgba(0,0,0,0.5);
            transition: 0.3s ease; padding: 2rem; z-index: 100;
        }
        #settings-panel.active { right: 0; }
        .setting-group { margin-bottom: 20px; }
        .setting-group label { display: block; margin-bottom: 8px; font-size: 14px; color: #aaa; }
        .setting-group input, .setting-group select { 
            width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #444; background: #131314; color: white; 
        }

        /* Chat Layout */
        main { flex: 1; display: flex; flex-direction: column; position: relative; }
        .chat-window { flex: 1; overflow-y: auto; padding: 2rem; display: flex; flex-direction: column; gap: 2rem; }
        
        .message { display: flex; gap: 1rem; max-width: 850px; width: 100%; margin: 0 auto; animation: fadeIn 0.3s; }
        .avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; flex-shrink: 0; }
        .ai .avatar { background: linear-gradient(45deg, #4285f4, #9b72cb); }
        .user .avatar { background: #5f6368; }
        .user-bubble { background: var(--user-msg-bg); padding: 12px 20px; border-radius: 20px; }

        /* Input Area */
        .input-area { padding: 1rem 2rem 2rem; max-width: 850px; width: 100%; margin: 0 auto; }
        .input-box { background: var(--input-bg); border-radius: 30px; padding: 12px 20px; display: flex; align-items: center; gap: 10px; }
        textarea { flex: 1; background: transparent; border: none; color: white; outline: none; resize: none; font-size: 16px; }
        .btn { cursor: pointer; border: none; background: none; color: var(--accent); font-weight: bold; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <aside>
        <button class="nav-item" onclick="location.reload()">+ New Chat</button>
        <button class="nav-item" onclick="toggleSettings()" style="margin-top: auto; background: #3c4043;">⚙️ Settings</button>
    </aside>

    <div id="settings-panel">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
            <h3>Configuration</h3>
            <button onclick="toggleSettings()" style="background:none; border:none; color:white; font-size:20px; cursor:pointer;">&times;</button>
        </div>
        
        <div class="setting-group">
            <label>Gemini API Key</label>
            <input type="password" id="api-key" placeholder="Paste your key here...">
        </div>

        <div class="setting-group">
            <label>Model ID</label>
            <select id="model-id">
                <option value="gemini-1.5-pro">Gemini 1.5 Pro</option>
                <option value="gemini-1.5-flash">Gemini 1.5 Flash</option>
                <option value="gemini-pro">Gemini Pro (Legacy)</option>
            </select>
        </div>

        <button onclick="saveSettings()" style="width:100%; padding:12px; background:var(--accent); color:white; border:none; border-radius:8px; cursor:pointer;">Save Configuration</button>
        <p id="save-status" style="font-size: 12px; margin-top: 10px; color: #4caf50; display: none;">Settings Saved!</p>
    </div>

    <main>
        <header style="padding: 1rem 2rem; display: flex; justify-content: space-between;">
            <h2>Gemini <span style="color:var(--accent); font-size: 14px;">Studio</span></h2>
        </header>

        <div id="chat-window" class="chat-window">
            <div id="welcome" style="margin: auto; text-align: center;">
                <h1 style="font-size: 2.5rem; margin-bottom: 0.5rem;">Ready to build?</h1>
                <p style="color: #80868b;">Configure your API key in settings to start chatting.</p>
            </div>
        </div>

        <div class="input-area">
            <div class="input-box">
                <textarea id="userInput" placeholder="Ask Gemini something..." rows="1"></textarea>
                <button id="sendBtn" class="btn">Send</button>
            </div>
        </div>
    </main>

    <script>
        const settingsPanel = document.getElementById('settings-panel');
        const chatWindow = document.getElementById('chat-window');
        const userInput = document.getElementById('userInput');
        const welcome = document.getElementById('welcome');

        // Load Settings from LocalStorage
        window.onload = () => {
            document.getElementById('api-key').value = localStorage.getItem('gemini_api_key') || '';
            document.getElementById('model-id').value = localStorage.getItem('gemini_model') || 'gemini-1.5-pro';
        };

        function toggleSettings() {
            settingsPanel.classList.toggle('active');
        }

        function saveSettings() {
            localStorage.setItem('gemini_api_key', document.getElementById('api-key').value);
            localStorage.setItem('gemini_model', document.getElementById('model-id').value);
            
            const status = document.getElementById('save-status');
            status.style.display = 'block';
            setTimeout(() => { status.style.display = 'none'; toggleSettings(); }, 1500);
        }

        async function sendMessage() {
            const key = localStorage.getItem('gemini_api_key');
            const model = localStorage.getItem('gemini_model');
            const prompt = userInput.value.trim();

            if (!prompt) return;
            if (!key) { alert('Please enter an API Key in settings first!'); toggleSettings(); return; }

            // UI Update
            if (welcome) welcome.style.display = 'none';
            appendMessage('user', prompt);
            userInput.value = '';

            // API Call logic
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }]
                    })
                });

                const data = await response.json();
                const aiText = data.candidates[0].content.parts[0].text;
                appendMessage('ai', aiText);
            } catch (error) {
                appendMessage('ai', "Error: API key বা Model সঠিক নয় অথবা কোটা শেষ হয়ে গেছে।");
                console.error(error);
            }
        }

        function appendMessage(role, text) {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            div.innerHTML = `
                <div class="avatar">${role === 'ai' ? '✦' : 'U'}</div>
                <div class="content ${role === 'user' ? 'user-bubble' : ''}">${text}</div>
            `;
            chatWindow.appendChild(div);
            chatWindow.scrollTo({ top: chatWindow.scrollHeight, behavior: 'smooth' });
        }

        document.getElementById('sendBtn').addEventListener('click', sendMessage);
        userInput.addEventListener('keydown', (e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
    </script>
</body>
</html>
