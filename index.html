<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Universal AI Chat</title>

<style>
body {
    display: flex;
    height: 100vh;
    background: #0f0f0f;
    color: white;
    font-family: Arial;
}

/* Sidebar */
.sidebar {
    width: 260px;
    background: #1a1a1a;
    padding: 15px;
}

button {
    cursor: pointer;
}

/* Main */
.main {
    flex: 1;
    display: flex;
    flex-direction: column;
}

/* Chat */
.chat-area {
    flex: 1;
    padding: 20px;
    overflow-y: auto;
}

.message {
    margin-bottom: 10px;
    padding: 10px;
    border-radius: 10px;
    max-width: 70%;
}

.user { background: #2563eb; margin-left: auto; }
.ai { background: #333; }

/* Input */
.input-area {
    display: flex;
    padding: 10px;
    background: #1a1a1a;
}

input {
    flex: 1;
    padding: 10px;
    border-radius: 6px;
    border: none;
}

/* Settings Modal */
.modal {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%,-50%);
    background: #222;
    padding: 20px;
    border-radius: 10px;
    display: none;
    width: 300px;
}
</style>
</head>

<body>

<div class="sidebar">
    <h2>AI Chat</h2>
    <button onclick="openSettings()">⚙️ Settings</button>
</div>

<div class="main">
    <div id="chat" class="chat-area"></div>

    <div class="input-area">
        <input id="input" placeholder="Ask anything...">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<!-- Settings Modal -->
<div id="modal" class="modal">
    <h3>Settings</h3>

    <label>API Key</label>
    <input id="apiKey" type="password"><br><br>

    <label>Model</label>
    <input id="model"><br><br>

    <button onclick="saveSettings()">Save</button>
</div>

<script>
const chat = document.getElementById("chat");

// Load saved settings
window.onload = () => {
    document.getElementById("apiKey").value = localStorage.getItem("apiKey") || "";
    document.getElementById("model").value = localStorage.getItem("model") || "openai/gpt-3.5-turbo";
};

function openSettings() {
    document.getElementById("modal").style.display = "block";
}

function saveSettings() {
    localStorage.setItem("apiKey", document.getElementById("apiKey").value);
    localStorage.setItem("model", document.getElementById("model").value);
    alert("Saved!");
    document.getElementById("modal").style.display = "none";
}

function addMessage(text, type) {
    const div = document.createElement("div");
    div.className = "message " + type;
    div.innerText = text;
    chat.appendChild(div);
}

async function sendMessage() {
    const input = document.getElementById("input");
    const text = input.value.trim();
    if (!text) return;

    addMessage(text, "user");
    input.value = "";

    const apiKey = localStorage.getItem("apiKey");
    const model = localStorage.getItem("model");

    if (!apiKey) {
        addMessage("Please set API Key in settings ⚙️", "ai");
        return;
    }

    addMessage("Thinking...", "ai");

    try {
        const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
            method: "POST",
            headers: {
                "Authorization": "Bearer " + apiKey,
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                model: model,
                messages: [{ role: "user", content: text }]
            })
        });

        const data = await res.json();
        chat.lastChild.innerText = data.choices[0].message.content;

    } catch (err) {
        chat.lastChild.innerText = "Error: " + err.message;
    }
}

// Enter support
document.getElementById("input").addEventListener("keypress", e => {
    if (e.key === "Enter") sendMessage();
});
</script>

</body>
</html>
